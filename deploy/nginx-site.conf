# Installed to /etc/nginx/sites-available/warehouse by setup-server.sh.
# deploy.sh overwrites /opt/warehouse/nginx-active-upstream.conf with the active slot port.

include /opt/warehouse/nginx-active-upstream.conf;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name part-db.bogza.ro;

    client_max_body_size 25m;

    location / {
        proxy_pass http://warehouse_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# After first deploy: sudo certbot --nginx -d part-db.bogza.ro
