# Installed to /etc/nginx/sites-available/warehouse by setup-server.sh.
# deploy.sh overwrites /opt/warehouse/nginx-active-upstream.conf with the active slot port.
# TLS: after `certbot --nginx`, use this file for BOTH :80 and :443 so HTTPS proxies to Node
# (do not rely on sites-enabled/default for part-db — remove duplicate server_name there).

include /opt/warehouse/nginx-active-upstream.conf;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name part-db.bogza.ro;

    client_max_body_size 25m;

    location / {
        proxy_pass http://warehouse_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name part-db.bogza.ro;

    ssl_certificate /etc/letsencrypt/live/part-db.bogza.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/part-db.bogza.ro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://warehouse_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
