name: Deploy

# Runs only after CI succeeds on main (push). Keeps deploy SSH failures separate from lint/build status.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install sshpass (SSH password auth for deploy)
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Deploy over SSH (blue-green)
        env:
          SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          sshpass -e ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -s' < deploy/deploy.sh

      - name: Tag deployment
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin || true
          TAG="deployed-${{ github.event.workflow_run.head_sha }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
