name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Apply migrations
        env:
          DATABASE_URL: "file:./ci.db"
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: "file:./ci.db"
          AUTH_SECRET: "ci-build-placeholder-secret-at-least-32-chars-long!!"
          AUTH_URL: "http://localhost:3000"
          AUTH_GOOGLE_ID: "ci-placeholder"
          AUTH_GOOGLE_SECRET: "ci-placeholder"
        run: npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sshpass (SSH password auth for deploy)
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Deploy over SSH (blue-green)
        env:
          SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          sshpass -e ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -s' < deploy/deploy.sh

      - name: Tag deployment
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin || true
          TAG="deployed-${{ github.sha }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
